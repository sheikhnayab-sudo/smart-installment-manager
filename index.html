<!doctype html>
<html lang="en">
  <head>
    <script>
      // Fix for "Cannot set property fetch of #<Window> which has only a getter"
      // This happens when libraries try to overwrite window.fetch in protected environments
      (function() {
        try {
          const originalFetch = window.fetch;
          if (originalFetch) {
            let currentFetch = originalFetch;
            try {
              Object.defineProperty(window, 'fetch', {
                get: function() { return currentFetch; },
                set: function(v) { 
                  console.warn('window.fetch was overwritten');
                  currentFetch = v; 
                },
                configurable: true,
                enumerable: true
              });
            } catch (e) {
              // If redefinition fails, we try to at least make it writable if it was just a value
              try {
                Object.defineProperty(window, 'fetch', {
                  value: originalFetch,
                  writable: true,
                  configurable: true,
                  enumerable: true
                });
              } catch (e2) {
                console.warn('Could not make fetch writable:', e2);
              }
            }
          }
        } catch (e) {
          console.warn('Fetch fix error:', e);
        }
      })();
    </script>
